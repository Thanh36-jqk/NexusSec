# ============================================================
#  NexusSec — Docker Compose
#  Usage:
#    cp .env.example .env        # populate credentials
#    docker compose up -d        # start all services
#    docker compose logs -f      # tail logs
#    docker compose down -v      # stop & remove volumes (DESTRUCTIVE)
# ============================================================

services:

  # ──────────────────────────────────────────────────────────
  #  PostgreSQL — Relational data (Users, Targets, Scan Jobs)
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexussec-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./deployments/docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nexussec-network

  # ──────────────────────────────────────────────────────────
  #  MongoDB — Document store (Vulnerability Reports)
  # ──────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: nexussec-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE:      ${MONGO_INITDB_DATABASE}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nexussec-network

  # ──────────────────────────────────────────────────────────
  #  Redis — Session cache & Rate Limiting
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexussec-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexussec-network

  # ──────────────────────────────────────────────────────────
  #  RabbitMQ — Message Broker (Scan Job Queue)
  # ──────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: nexussec-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - nexussec-network

  # ──────────────────────────────────────────────────────────
  #  Gateway — API Gateway (public entry-point)
  #  Host port 80 -> container port 8080
  #  Depends on: postgres (auth/session), redis (rate-limit/cache)
  # ──────────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: ./deployments/docker/gateway/Dockerfile
    image: nexussec/gateway:latest
    container_name: nexussec-gateway
    restart: unless-stopped
    ports:
      - "80:8080"
    environment:
      # PostgreSQL
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      # Redis
      REDIS_HOST:        redis
      REDIS_PORT:        6379
      REDIS_PASSWORD:    ${REDIS_PASSWORD}
      # JWT
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH}
      JWT_PUBLIC_KEY_PATH:  ${JWT_PUBLIC_KEY_PATH}
      JWT_EXPIRATION:       ${JWT_EXPIRATION}
      JWT_ISSUER:           ${JWT_ISSUER}
      JWT_REFRESH_DURATION: ${JWT_REFRESH_DURATION}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexussec-network

  # ──────────────────────────────────────────────────────────
  #  Worker — Scanner Engine
  #  * Consumes jobs from RabbitMQ
  #  * Persists reports to MongoDB
  #  * Spawns ephemeral scan containers via Docker socket
  #
  #  SECURITY NOTE: Docker socket access grants root-equivalent
  #  privileges on the host. Restrict this image to a trusted,
  #  minimal build and never expose the worker publicly.
  # ──────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: ./deployments/docker/worker/Dockerfile
    image: nexussec/worker:latest
    container_name: nexussec-worker
    restart: unless-stopped
    volumes:
      # Docker socket — required to spawn ephemeral scanner containers
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # MongoDB
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE:      ${MONGO_INITDB_DATABASE}
      MONGO_HOST:                 mongodb
      MONGO_PORT:                 27017
      # RabbitMQ
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_HOST:         rabbitmq
      RABBITMQ_PORT:         5672
      # Scanner runtime
      SCAN_NETWORK:        scan-network
      SCANNER_CONCURRENCY: ${SCANNER_CONCURRENCY}
      PROXY_TIMEOUT:       ${PROXY_TIMEOUT}
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - nexussec-network

# ────────────────────────────────────────────────────────────
#  Named Volumes — Data persists across container restarts
# ────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  mongodata:
    driver: local
  redisdata:
    driver: local
  rabbitmqdata:
    driver: local

# ────────────────────────────────────────────────────────────
#  Networks
# ────────────────────────────────────────────────────────────
networks:
  # Primary internal network — all 6 services communicate here.
  nexussec-network:
    driver: bridge

  # ISOLATED scan network — used exclusively by ephemeral scanner
  # containers spawned by the worker via the Docker socket.
  #
  # SECURITY: Separated from nexussec-network so scan containers
  # cannot reach internal infrastructure (Postgres, MongoDB, Redis,
  # RabbitMQ), preventing SSRF and lateral-movement attacks.
  scan-network:
    driver: bridge
    internal: false  # outbound internet access needed to reach scan targets