name: Deploy to GHCR and Azure

on:
  push:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow pushing to GHCR
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lower case repository name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Generate JWT keys
        run: |
          mkdir -p deployments/jwt
          openssl genpkey -algorithm RSA -out deployments/jwt/private.pem -pkeyopt rsa_keygen_bits:2048
          openssl rsa -pubout -in deployments/jwt/private.pem -out deployments/jwt/public.pem

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and Push Gateway
      - name: Build and push Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.gateway
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/nexussec-gateway:latest
          cache-from: type=registry,ref=ghcr.io/${{ env.REPO_LC }}/nexussec-gateway:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.REPO_LC }}/nexussec-gateway:buildcache,mode=max

      # Build and Push Worker
      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/nexussec-worker:latest
          cache-from: type=registry,ref=ghcr.io/${{ env.REPO_LC }}/nexussec-worker:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.REPO_LC }}/nexussec-worker:buildcache,mode=max

      # Build and Push Frontend
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/nexussec-frontend:latest
          cache-from: type=registry,ref=ghcr.io/${{ env.REPO_LC }}/nexussec-frontend:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.REPO_LC }}/nexussec-frontend:buildcache,mode=max

  deploy-to-azure:
    name: Run Azure Deployment
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Navigate to the project directory
            cd /home/${{ secrets.VM_USERNAME }}/NexusSec
            
            # Authenticate Azure VM Docker with GHCR 
            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull repository updates (for Caddyfile, docker-compose.prod.yml)
            git pull origin main
            
            # Explicitly export the repository name downcased for docker-compose.prod.yml mapping
            export GITHUB_REPOSITORY=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            
            # Pull new GHCR images and restart seamlessly
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            
            # Cleanup old dangling images to prevent disk space exhaustion
            docker image prune -f
