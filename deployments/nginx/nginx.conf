# ============================================================
#  NexusSec — Nginx Reverse Proxy
#
#  Routes all traffic through a single public port (80):
#    /api/*  → gateway:8080   (Backend REST API)
#    /ws/*   → gateway:8080   (WebSocket upgrades)
#    /*      → frontend:3000  (Next.js UI)
#
#  To add HTTPS later:
#    1. Mount SSL certs into the container
#    2. Add a server block on port 443
#    3. Redirect port 80 → 443
# ============================================================

upstream gateway {
    server gateway:8080;
}

upstream frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;  # Wildcard — works with raw IP. Replace with domain later.

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── API Proxy (/api/*) ───────────────────────────────────
    location /api/ {
        proxy_pass http://gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running scan operations
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # ── WebSocket Proxy (/ws/*) ──────────────────────────────
    location /ws/ {
        proxy_pass http://gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Keep WebSocket alive for scan progress updates
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Frontend (catch-all) ─────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health Check Endpoint ────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
