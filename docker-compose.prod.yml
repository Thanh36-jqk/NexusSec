# ============================================================
#  NexusSec — Docker Compose (Production / GHCR Registry)
#  Usage:
#    cp .env.example .env        # populate credentials
#    docker compose -f docker-compose.prod.yml pull
#    docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:

  # ──────────────────────────────────────────────────────────
  #  PostgreSQL — Relational data (Users, Targets, Scan Jobs)
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexussec-postgres
    restart: always
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./deployments/docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nexussec-network

  # ──────────────────────────────────────────────────────────
  #  MongoDB — Document store (Vulnerability Reports)
  # ──────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: nexussec-mongodb
    restart: always
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 1.5G
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE:      ${MONGO_INITDB_DATABASE}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nexussec-network

  # ──────────────────────────────────────────────────────────
  #  Redis — Session cache & Rate Limiting
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexussec-redis
    restart: always
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexussec-network

  # ──────────────────────────────────────────────────────────
  #  RabbitMQ — Message Broker (Scan Job Queue)
  # ──────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: nexussec-rabbitmq
    restart: always
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - nexussec-network

  # ──────────────────────────────────────────────────────────
  #  Gateway — API Gateway
  # ──────────────────────────────────────────────────────────
  gateway:
    image: ghcr.io/${GITHUB_REPOSITORY}/nexussec-gateway:latest
    container_name: nexussec-gateway
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
    expose:
      - "8080"
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      REDIS_HOST:        redis
      REDIS_PORT:        6379
      REDIS_PASSWORD:    ${REDIS_PASSWORD}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_HOST:         rabbitmq
      RABBITMQ_PORT:         5672
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE:      ${MONGO_INITDB_DATABASE}
      MONGO_HOST:                 mongodb
      MONGO_PORT:                 27017
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH}
      JWT_PUBLIC_KEY_PATH:  ${JWT_PUBLIC_KEY_PATH}
      JWT_EXPIRATION:       ${JWT_EXPIRATION}
      JWT_ISSUER:           ${JWT_ISSUER}
      JWT_REFRESH_DURATION: ${JWT_REFRESH_DURATION}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - nexussec-network

  # ──────────────────────────────────────────────────────────
  #  Worker — Scanner Engine
  # ──────────────────────────────────────────────────────────
  worker:
    image: ghcr.io/${GITHUB_REPOSITORY}/nexussec-worker:latest
    container_name: nexussec-worker
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE:      ${MONGO_INITDB_DATABASE}
      MONGO_HOST:                 mongodb
      MONGO_PORT:                 27017
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_HOST:         rabbitmq
      RABBITMQ_PORT:         5672
      SCAN_NETWORK:        scan-network
      SCANNER_CONCURRENCY: ${SCANNER_CONCURRENCY:-2}
      PROXY_TIMEOUT:       ${PROXY_TIMEOUT:-120s}
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - nexussec-network

  # ──────────────────────────────────────────────────────────
  #  Frontend — Next.js Dashboard
  # ──────────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/nexussec-frontend:latest
    container_name: nexussec-frontend
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api/v1
    depends_on:
      - gateway
    networks:
      - nexussec-network

  # ──────────────────────────────────────────────────────────
  #  Caddy — Auto-HTTPS Reverse Proxy
  # ──────────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: nexussec-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - gateway
      - frontend
    networks:
      - nexussec-network

# ────────────────────────────────────────────────────────────
#  Named Volumes Data & SSL Certs Persist Across Restarts
# ────────────────────────────────────────────────────────────
volumes:
  pgdata:
  mongodata:
  redisdata:
  rabbitmqdata:
  caddy_data:
  caddy_config:

# ────────────────────────────────────────────────────────────
#  Networks
# ────────────────────────────────────────────────────────────
networks:
  nexussec-network:
    driver: bridge
  scan-network:
    driver: bridge
    internal: false
